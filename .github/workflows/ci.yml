name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - name: Install Python dependencies
        run: uv sync --frozen --all-groups

      - name: Ruff check
        run: uv run ruff check . --force-exclude

      - name: Ruff format check
        run: uv run ruff format --check . --force-exclude

      - name: Python unit and smoke tests
        run: uv run pytest tests/test_smoke.py tests/test_client_unit.py

  scala:
    name: Scala
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Compile Scala main and test code
        run: sbt "Test / compile"
